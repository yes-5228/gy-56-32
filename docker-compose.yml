services:
  backend:
    build:
      context: ./backend
    environment:
      DJANGO_DEBUG: "1"
      CORS_ALLOW_ALL_ORIGINS: "1"
      SQLITE_PATH: /app/data/db.sqlite3
    volumes:
      - backend-data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_PROXY: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  backend-data:
